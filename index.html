<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.469.0/font/lucide.min.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pact-Man</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #092430;
      display: flex;
      flex-direction: column;
    }

    /* -- Header -- */
    header {
      background: #092430;
      color: white;
      padding: 22px 24px;
    }
    header h1 { font-size: 18px; font-weight: 600; margin-bottom: 3px; }
    header p  { font-size: 15px; opacity: 0.65; }

    /* -- Chat -- */
    .chat {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #ffffff;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
    }
    .message.bot  { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      font-weight: 600;
      color: white;
    }
    .message.bot  .avatar { background: #D09047; }
    .message.user .avatar { background: #7D97A5; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.55;
    }
    .message.bot .bubble {
      background: #f5f5f5;
      border-left: 3px solid #d0d0d0;
      border-radius: 4px;
      color: #333333;
    }
    .message.user .bubble {
      background: #e8f0f4;
      border-left: 3px solid #7D97A5;
      border-radius: 4px;
      color: #333333;
    }

    /* Typing indicator */
    .typing-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #D09047;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* -- Input area -- */
    .input-area {
      padding: 12px 48px 16px;
      background: #ffffff;
    }

    .input-bar {
      display: flex;
      align-items: center;
      background: #e8eef1;
      border-radius: 24px;
      padding: 6px 6px 6px 20px;
      gap: 8px;
      max-width: 780px;
      margin: 0 auto;
    }

    .input-bar textarea {
      flex: 1;
      padding: 12px 0;
      border: none;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: #c0cdd4;
      resize: none;
      min-height: 28px;
      max-height: 120px;
      line-height: 1.45;
    }
    .input-bar textarea:focus { outline: none; }
    .input-bar textarea::placeholder { color: #3a5a6a; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #D09047;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s;
      padding: 0;
    }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { background: #b87a38; }
    .send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Pact-Man — Series A Negotiation</h1>
      <p>You are the <strong>VC investor</strong>. Negotiate with the founder in natural language.</p>
    </div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>

<script>
  // Conversation history sent to the API
  let conversationHistory = [];
  let sending = false;

  const BOT_INTRO =
    "Hey! We're raising a Series A for our space tech startup and I couldn't be more fired up about the mission.\n\n" +
    "We've got two payload contracts signed, a launch window in 18 months, and a team of ex-NASA engineers.\n\n" +
    "I'm open to discussing equity split, stock type, board representation, vesting, and CEO provisions. What are you thinking for terms?";

  // -- Helpers --

  function addMessage(role, text) {
    const chat = document.getElementById('chat');

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerHTML = role === 'bot' ? '<i class="icon-rocket"></i>' : '';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    text.split('\n').forEach((line, i) => {
      if (i > 0) bubble.appendChild(document.createElement('br'));
      bubble.appendChild(document.createTextNode(line));
    });

    if (role === 'bot') wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.className = 'message bot';
    wrapper.id = 'typing';
    wrapper.innerHTML =
      '<div class="avatar"><i class="icon-rocket"></i></div>' +
      '<div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  }

  // -- Chat flow --

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    // Auto-resize on next tick
    setTimeout(() => autoResize(e.target), 0);
  }

  async function sendMessage() {
    if (sending) return;

    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    sending = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    autoResize(input);

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/api/negotiate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory }),
      });
      const data = await res.json();
      hideTyping();

      const reply = data.message || 'Something went wrong. Could you try again?';
      addMessage('bot', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      hideTyping();
      addMessage('bot', 'Something went wrong. Please try again.');
    }

    sending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // -- Init --
  addMessage('bot', BOT_INTRO);
  conversationHistory.push({ role: 'assistant', content: BOT_INTRO });
</script>
</body>
</html>
