<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.469.0/font/lucide.min.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pact-Man</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #092430;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0b2e3d, #092430);
      color: white;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    header h1 { font-size: 18px; font-weight: 600; margin-bottom: 3px; }
    header p  { font-size: 15px; opacity: 0.65; }
    .round-badge {
      background: rgba(255,255,255,0.12);
      font-size: 15px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 2px;
      color: #D09047;
    }

    /* ── Chat ── */
    .chat {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #071e28;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
    }
    .message.bot  { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      font-weight: 600;
      color: white;
    }
    .message.bot  .avatar { background: #D09047; }
    .message.user .avatar { background: #7D97A5; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.55;
    }
    .message.bot .bubble {
      background: #0d2f3e;
      border: 1px solid rgba(125,151,165,0.15);
      border-bottom-left-radius: 4px;
      color: #e8eff2;
    }
    .message.user .bubble {
      background: #7D97A5;
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* Offer pill inside a bubble */
    .offer-pill {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }
    .offer-pill span {
      font-size: 15px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      color: #7D97A5;
    }
    .message.user .offer-pill span { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }

    /* Typing indicator */
    .typing-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #D09047;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Form ── */
    .form-area {
      border-top: 1px solid rgba(125,151,165,0.15);
      padding: 20px 24px;
      background: #092430;
    }
    .form-area h3 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #7D97A5;
      margin-bottom: 14px;
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: #7D97A5;
      margin-bottom: 5px;
    }
    .field .hint {
      font-size: 15px;
      color: #5a7a8a;
      font-weight: 400;
      margin-left: 3px;
    }
    .field input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid rgba(125,151,165,0.2);
      border-radius: 8px;
      font-size: 15px;
      background: #071e28;
      color: #c0cdd4;
      transition: border-color 0.15s;
    }
    .field input:focus  { outline: none; border-color: #D09047; }
    .field input:disabled { background: #061a23; color: #3a5a6a; }
    .field input::placeholder { color: #3a5a6a; }

    .actions { display: flex; gap: 10px; }

    button {
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary   { background: #D09047; color: white; }
    .btn-primary:not(:disabled):hover { background: #b87a38; }
    .btn-secondary { background: rgba(125,151,165,0.15); color: #7D97A5; }
    .btn-secondary:not(:disabled):hover { background: rgba(125,151,165,0.25); }
    .btn-reset { background: none; color: #7D97A5; font-size: 15px; padding: 10px 12px; }
    .btn-reset:hover { color: #c0cdd4; }

    /* ── Status bar ── */
    .status-bar {
      border-top: 1px solid rgba(125,151,165,0.15);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #7D97A5;
      background: #0b2e3d;
    }
    .score-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar {
      height: 100%;
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s, background 0.4s;
      background: #555;
    }
    .score-label { font-weight: 600; min-width: 38px; text-align: right; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Pact-Man — Series A Negotiation</h1>
      <p>You are the <strong>VC investor</strong>. Negotiate term sheet with the founder.</p>
    </div>
    <div class="round-badge" id="roundBadge" style="display:none">Round 1 / 6</div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="form-area" id="formArea">
    <h3>Your Term Sheet</h3>
    <div class="fields">
      <div class="field">
        <label>Valuation <span class="hint">($M pre-money)</span></label>
        <input type="number" id="valuation" min="1" step="1" placeholder="e.g. 25" />
      </div>
      <div class="field">
        <label>Equity <span class="hint">(% for your fund)</span></label>
        <input type="number" id="equity" min="1" max="100" step="1" placeholder="e.g. 20" />
      </div>
      <div class="field">
        <label>Board seats <span class="hint">(for your fund)</span></label>
        <input type="number" id="boardSeats" min="0" step="1" placeholder="e.g. 2" />
      </div>
      <div class="field">
        <label>Liquidation pref <span class="hint">(x multiple)</span></label>
        <input type="number" id="liquidationPref" min="0.5" step="0.1" placeholder="e.g. 1.5" />
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary"   id="submitBtn"  onclick="submitOffer()">Submit</button>
      <button class="btn-secondary" id="acceptBtn"  onclick="acceptCounter()" style="display:none">Accept Founder's Counter</button>
      <button class="btn-reset"     id="resetBtn"   onclick="resetGame()"    style="display:none">New Negotiation</button>
    </div>
  </div>

  <div class="status-bar">
    <span>Founder satisfaction</span>
    <div class="score-bar-wrap"><div class="score-bar" id="scoreBar"></div></div>
    <span class="score-label" id="scoreLabel">—</span>
  </div>

<script>
  let round = 0;
  let lastCounter = null;
  let ended = false;

  const BOT_INTRO =
    'Hey! We\'re raising a Series A for our space tech startup and I couldn\'t be more fired up about the mission.\n\n' +
    'Here\'s where I\'d love to land: ~$50M pre-money valuation, 10-15% equity, 1 board seat for you, and a clean 1x liquidation preference.\n\n' +
    'We\'ve got two payload contracts signed, a launch window in 18 months, and a team of ex-NASA engineers. Send over your opening term sheet — let\'s see if we can get this rocket funded.';

  // ── Helpers ──────────────────────────────────────────────────────────────

  function addMessage(role, text, offerData) {
    const chat = document.getElementById('chat');

    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerHTML = role === 'bot' ? '<i class="icon-rocket"></i>' : '<i class="icon-banknote"></i>';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    text.split('\n').forEach((line, i) => {
      if (i > 0) bubble.appendChild(document.createElement('br'));
      bubble.appendChild(document.createTextNode(line));
    });

    if (offerData) {
      const pill = document.createElement('div');
      pill.className = 'offer-pill';
      pill.innerHTML =
        `<span>$${offerData.valuation}M</span>` +
        `<span>${offerData.equity}% equity</span>` +
        `<span>${offerData.boardSeats} seat${offerData.boardSeats !== 1 ? 's' : ''}</span>` +
        `<span>${offerData.liquidationPref}x liq pref</span>`;
      bubble.appendChild(pill);
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const wrapper = document.createElement('div');
    wrapper.className = 'message bot';
    wrapper.id = 'typing';
    wrapper.innerHTML =
      '<div class="avatar"><i class="icon-rocket"></i></div>' +
      '<div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function updateScore(utility) {
    const bar   = document.getElementById('scoreBar');
    const label = document.getElementById('scoreLabel');
    bar.style.width      = utility + '%';
    bar.style.background = utility >= 70 ? '#16a34a' : utility >= 40 ? '#d97706' : '#D09047';
    label.textContent    = utility + '%';
    label.style.color    = utility >= 70 ? '#16a34a' : utility >= 40 ? '#d97706' : '#D09047';
  }

  function fillForm(offer) {
    document.getElementById('valuation').value       = offer.valuation;
    document.getElementById('equity').value           = offer.equity;
    document.getElementById('boardSeats').value       = offer.boardSeats;
    document.getElementById('liquidationPref').value  = offer.liquidationPref;
  }

  function readForm() {
    return {
      valuation:       parseFloat(document.getElementById('valuation').value),
      equity:          parseFloat(document.getElementById('equity').value),
      boardSeats:      parseFloat(document.getElementById('boardSeats').value),
      liquidationPref: parseFloat(document.getElementById('liquidationPref').value),
    };
  }

  function setFormDisabled(disabled) {
    ['valuation', 'equity', 'boardSeats', 'liquidationPref'].forEach(id => {
      document.getElementById(id).disabled = disabled;
    });
  }

  // ── Game flow ─────────────────────────────────────────────────────────────

  async function submitOffer() {
    if (ended) return;

    const offer = readForm();
    if (Object.values(offer).some(v => isNaN(v) || v <= 0)) {
      alert('Please fill in all four fields with positive numbers.');
      return;
    }

    round++;
    document.getElementById('roundBadge').textContent = `Round ${round} / 6`;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('acceptBtn').style.display = 'none';

    addMessage('user', 'My term sheet:', offer);
    showTyping();

    try {
      const res  = await fetch('/api/negotiate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ offer, round }),
      });
      const data = await res.json();
      hideTyping();
      updateScore(data.utility);

      if (data.status === 'accepted') {
        addMessage('bot', data.message);
        endGame('accepted');
      } else if (data.status === 'rejected') {
        addMessage('bot', data.message);
        endGame('rejected');
      } else {
        lastCounter = data.counter;
        addMessage('bot', data.message, data.counter);
        fillForm(data.counter);
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('acceptBtn').style.display = 'inline-block';
      }
    } catch (err) {
      hideTyping();
      addMessage('bot', 'Something went wrong. Please try again.');
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function acceptCounter() {
    if (!lastCounter || ended) return;
    fillForm(lastCounter);
    submitOffer();
  }

  function endGame(result) {
    ended = true;
    setFormDisabled(true);
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('acceptBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display  = 'inline-block';
  }

  function resetGame() {
    round       = 0;
    lastCounter = null;
    ended       = false;

    document.getElementById('chat').innerHTML       = '';
    document.getElementById('roundBadge').textContent = 'Round 1 / 6';
    document.getElementById('scoreBar').style.width  = '0%';
    document.getElementById('scoreLabel').textContent = '—';
    document.getElementById('submitBtn').disabled   = false;
    document.getElementById('acceptBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display  = 'none';
    setFormDisabled(false);
    fillForm({ valuation: '', equity: '', boardSeats: '', liquidationPref: '' });

    addMessage('bot', BOT_INTRO);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  addMessage('bot', BOT_INTRO);
</script>
</body>
</html>
